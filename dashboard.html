<!DOCTYPE html>
<html>
<head>
    <title>Multi-Messenger Events Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff6b6b 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #8b949e;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px 20px;
            min-width: 150px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .multi-messenger { color: #ff6b6b; }
        .gw-only { color: #00d4ff; }
        #skymap {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 10px;
            height: 700px;
        }
        .events-table {
            margin-top: 30px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #21262d;
            padding: 12px;
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #30363d;
        }
        tr:hover { background: #21262d; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-multi { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .badge-gw { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
        .refresh-info {
            text-align: center;
            color: #8b949e;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Multi-Messenger Events Dashboard</h1>
        <p class="subtitle">Gravitational wave events with electromagnetic counterparts</p>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-events">-</div>
                <div class="stat-label">Total Events</div>
            </div>
            <div class="stat-card">
                <div class="stat-value multi-messenger" id="multi-events">-</div>
                <div class="stat-label">Multi-Messenger</div>
            </div>
            <div class="stat-card">
                <div class="stat-value gw-only" id="gw-events">-</div>
                <div class="stat-label">GW Only</div>
            </div>
        </div>

        <div id="skymap"></div>
        <div class="refresh-info">Auto-refreshing every 5 seconds • Last update: <span id="last-update">-</span></div>

        <div class="events-table">
            <table>
                <thead>
                    <tr>
                        <th>Event ID</th>
                        <th>Type</th>
                        <th>RA (deg)</th>
                        <th>Dec (deg)</th>
                        <th>SNR</th>
                        <th>FAR (Hz)</th>
                        <th>Detections</th>
                        <th>Skymap</th>
                    </tr>
                </thead>
                <tbody id="events-tbody">
                    <tr><td colspan="8" style="text-align: center; padding: 20px;">Loading events...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let eventsData = [];
        let skymapData = {};

        async function loadEvents() {
            try {
                const response = await fetch('http://localhost:8080/api/events');
                eventsData = await response.json();

                // Try to fetch skymap for each event
                for (const event of eventsData) {
                    try {
                        const skymapResponse = await fetch(`http://localhost:8080${event.skymap_url}`);
                        if (skymapResponse.ok) {
                            const blob = await skymapResponse.blob();
                            skymapData[event.event_id] = { size: blob.size, available: true };
                        }
                    } catch (e) {
                        skymapData[event.event_id] = { available: false };
                    }
                }

                updateStats();
                updateSkyMap();
                updateTable();

                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Failed to load events:', error);
                document.getElementById('skymap').innerHTML =
                    '<div style="color: #f85149; padding: 40px; text-align: center;">' +
                    '<h3>⚠️ Cannot connect to API</h3>' +
                    '<p style="margin-top: 10px;">Make sure mm_api_server is running on port 8080</p>' +
                    '</div>';
            }
        }

        function updateStats() {
            const multiMessenger = eventsData.filter(e =>
                (e.grb_detections && e.grb_detections.length > 0) ||
                (e.optical_detections && e.optical_detections.length > 0)
            );
            const gwOnly = eventsData.filter(e =>
                (!e.grb_detections || e.grb_detections.length === 0) &&
                (!e.optical_detections || e.optical_detections.length === 0)
            );

            document.getElementById('total-events').textContent = eventsData.length;
            document.getElementById('multi-events').textContent = multiMessenger.length;
            document.getElementById('gw-events').textContent = gwOnly.length;
        }

        function estimateLocalizationRadius(event) {
            // Estimate 90% credible region radius in degrees based on SNR
            // Lower SNR = larger uncertainty
            // Rough approximation: radius ∝ 1/SNR
            const baseRadius = 100; // degrees for SNR=1
            return Math.min(baseRadius / event.snr, 90);
        }

        function updateSkyMap() {
            const gwOnly = eventsData.filter(e =>
                (!e.grb_detections || e.grb_detections.length === 0) &&
                (!e.optical_detections || e.optical_detections.length === 0)
            );
            const multiMessenger = eventsData.filter(e =>
                (e.grb_detections && e.grb_detections.length > 0) ||
                (e.optical_detections && e.optical_detections.length > 0)
            );

            const makeHover = (e) => {
                let text = `<b>${e.event_id}</b><br>RA: ${e.ra.toFixed(2)}°<br>Dec: ${e.dec.toFixed(2)}°<br>SNR: ${e.snr.toFixed(1)}<br>FAR: ${e.far.toExponential(2)} Hz`;
                text += `<br>Est. 90% region: ~${estimateLocalizationRadius(e).toFixed(1)}° radius`;
                if (e.grb_detections && e.grb_detections.length > 0) {
                    text += '<br><br><b>GRB Detections:</b>';
                    e.grb_detections.forEach(g => text += `<br>• ${g.instrument}`);
                }
                if (e.optical_detections && e.optical_detections.length > 0) {
                    text += '<br><br><b>Optical:</b>';
                    e.optical_detections.forEach(o => text += `<br>• ${o.survey} (mag ${o.magnitude.toFixed(1)})`);
                }
                return text;
            };

            // Create localization uncertainty circles
            const createCircle = (ra, dec, radius, color, opacity) => {
                const points = 50;
                const circle = { x: [], y: [] };
                for (let i = 0; i <= points; i++) {
                    const angle = (i / points) * 2 * Math.PI;
                    // Simple circular approximation (not accurate near poles)
                    const cosDecFactor = Math.cos(dec * Math.PI / 180);
                    circle.x.push(ra + radius * Math.cos(angle) / cosDecFactor);
                    circle.y.push(dec + radius * Math.sin(angle));
                }
                return circle;
            };

            const traces = [];

            // Add uncertainty regions for multi-messenger events
            multiMessenger.forEach(e => {
                const radius = estimateLocalizationRadius(e);
                const circle = createCircle(e.ra, e.dec, radius, '#ff6b6b', 0.1);
                traces.push({
                    x: circle.x,
                    y: circle.y,
                    mode: 'lines',
                    line: { color: '#ff6b6b', width: 1 },
                    fill: 'toself',
                    fillcolor: 'rgba(255, 107, 107, 0.1)',
                    hoverinfo: 'skip',
                    showlegend: false
                });
            });

            // Add uncertainty regions for GW-only events
            gwOnly.forEach(e => {
                const radius = estimateLocalizationRadius(e);
                const circle = createCircle(e.ra, e.dec, radius, '#00d4ff', 0.1);
                traces.push({
                    x: circle.x,
                    y: circle.y,
                    mode: 'lines',
                    line: { color: '#00d4ff', width: 1 },
                    fill: 'toself',
                    fillcolor: 'rgba(0, 212, 255, 0.1)',
                    hoverinfo: 'skip',
                    showlegend: false
                });
            });

            // Add event markers on top
            traces.push({
                x: multiMessenger.map(e => e.ra),
                y: multiMessenger.map(e => e.dec),
                text: multiMessenger.map(e => e.event_id),
                hovertemplate: multiMessenger.map(makeHover).map(t => t + '<extra></extra>'),
                mode: 'markers+text',
                type: 'scatter',
                name: 'Multi-Messenger',
                marker: { size: 20, color: '#ff6b6b', symbol: 'star', line: { color: '#fff', width: 1 } },
                textposition: 'top center',
                textfont: { size: 11, color: '#ff6b6b', family: 'Arial Black' }
            });

            traces.push({
                x: gwOnly.map(e => e.ra),
                y: gwOnly.map(e => e.dec),
                text: gwOnly.map(e => e.event_id),
                hovertemplate: gwOnly.map(makeHover).map(t => t + '<extra></extra>'),
                mode: 'markers+text',
                type: 'scatter',
                name: 'GW Only',
                marker: { size: 16, color: '#00d4ff', symbol: 'circle', line: { color: '#fff', width: 1 } },
                textposition: 'top center',
                textfont: { size: 11, color: '#00d4ff', family: 'Arial Black' }
            });

            const layout = {
                title: {
                    text: 'Sky Localization Map (with estimated 90% credible regions)',
                    font: { size: 14, color: '#8b949e' }
                },
                xaxis: {
                    title: 'Right Ascension (deg)',
                    range: [0, 360],
                    dtick: 60,
                    gridcolor: '#21262d',
                    zerolinecolor: '#21262d'
                },
                yaxis: {
                    title: 'Declination (deg)',
                    range: [-90, 90],
                    dtick: 30,
                    gridcolor: '#21262d',
                    zerolinecolor: '#21262d'
                },
                plot_bgcolor: '#0d1117',
                paper_bgcolor: '#161b22',
                font: { color: '#c9d1d9', size: 12 },
                hovermode: 'closest',
                showlegend: true,
                legend: {
                    x: 0.02,
                    y: 0.98,
                    bgcolor: 'rgba(22, 27, 34, 0.9)',
                    bordercolor: '#30363d',
                    borderwidth: 1
                },
                margin: { l: 60, r: 20, t: 40, b: 50 }
            };

            Plotly.newPlot('skymap', traces, layout, {responsive: true, displayModeBar: false});
        }

        function updateTable() {
            const tbody = document.getElementById('events-tbody');
            tbody.innerHTML = eventsData.map(e => {
                const isMulti = (e.grb_detections && e.grb_detections.length > 0) ||
                               (e.optical_detections && e.optical_detections.length > 0);

                const detections = [];
                if (e.grb_detections && e.grb_detections.length > 0) {
                    detections.push(`GRB (${e.grb_detections.length})`);
                }
                if (e.optical_detections && e.optical_detections.length > 0) {
                    detections.push(`Optical (${e.optical_detections.length})`);
                }

                const hasSkymap = skymapData[e.event_id]?.available;
                const skymapStatus = hasSkymap ?
                    `✓ (${(skymapData[e.event_id].size / 1024).toFixed(1)} KB)` :
                    `~${estimateLocalizationRadius(e).toFixed(0)}° est.`;

                return `
                    <tr>
                        <td><strong>${e.event_id}</strong></td>
                        <td><span class="badge ${isMulti ? 'badge-multi' : 'badge-gw'}">${isMulti ? 'Multi-Messenger' : 'GW Only'}</span></td>
                        <td>${e.ra.toFixed(2)}</td>
                        <td>${e.dec.toFixed(2)}</td>
                        <td>${e.snr.toFixed(1)}</td>
                        <td>${e.far.toExponential(2)}</td>
                        <td>${detections.join(', ') || '-'}</td>
                        <td style="font-size: 11px;">${skymapStatus}</td>
                    </tr>
                `;
            }).join('');
        }

        // Initial load
        loadEvents();

        // Auto-refresh every 5 seconds
        setInterval(loadEvents, 5000);
    </script>
</body>
</html>
