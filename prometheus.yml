global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Kafka exporter metrics
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Correlation metrics exporter
  - job_name: 'mm-correlations'
    static_configs:
      - targets: ['host.docker.internal:9091']
