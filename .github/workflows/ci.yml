name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libcfitsio-dev libsasl2-dev libfontconfig1-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-check-

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - uses: pre-commit/action@v3.0.1

  test:
    name: Test (${{ matrix.os }})
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          sudo apt-get update
          sudo apt-get install -y libcfitsio-dev libsasl2-dev libfontconfig1-dev
        elif [ "$RUNNER_OS" == "macOS" ]; then
          brew install cfitsio cyrus-sasl
        fi
      shell: bash

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-test-

    - name: Free disk space
      if: runner.os == 'Linux'
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        df -h /

    - name: Build all crates
      run: cargo build --all

    - name: Run tests (skip doc tests to save disk)
      run: cargo test --all --lib --tests --bins

    - name: Clean debug artifacts before release build
      if: matrix.os == 'ubuntu-latest'
      run: cargo clean --profile dev

    - name: Build release binaries
      if: matrix.os == 'ubuntu-latest'
      run: |
        cargo build --release --bin mm-correlator-service
        cargo build --release --bin stream-events
        cargo build --release --bin stream-optical-alerts
        cargo build --release --bin correlation-exporter
        cargo build --release --bin stream-o4-simulation
        cargo build --release --bin mm_api_server
        cargo build --release --bin daily-comparison
        cargo build --release --bin far-tuning-campaign

    - name: Upload binaries
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ runner.os }}
        path: |
          target/release/mm-correlator-service
          target/release/stream-events
          target/release/stream-optical-alerts
          target/release/correlation-exporter
          target/release/stream-o4-simulation
          target/release/mm_api_server
          target/release/daily-comparison
          target/release/far-tuning-campaign

  integration-test:
    name: Integration Tests (Redis)
    needs: pre-commit
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libcfitsio-dev libsasl2-dev libfontconfig1-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-integration-

    - name: Run Redis integration tests
      run: |
        cargo test -p mm-redis -- --ignored --test-threads=1
        cargo test -p mm-service --test state_recovery_integration -- --ignored --test-threads=1
      env:
        REDIS_URL: redis://localhost:6379

  docs:
    name: Documentation
    needs: pre-commit
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libcfitsio-dev libsasl2-dev libfontconfig1-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-docs-

    - name: Build API documentation
      run: cargo doc --no-deps --all

    - name: Install mdbook
      run: cargo install mdbook --no-default-features

    - name: Build mdbook documentation
      run: mdbook build
